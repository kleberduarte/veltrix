<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Veltrix Offline</title>
  <style>
    :root { color-scheme: light; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: #f8fafc;
      color: #0f172a;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .card {
      max-width: 520px;
      width: 100%;
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 12px 28px rgba(15, 23, 42, 0.06);
    }
    h1 { margin: 0 0 8px; font-size: 22px; }
    p { margin: 0; color: #475569; line-height: 1.45; }
  </style>
</head>
<body>
  <main class="card">
    <h1>Você está offline</h1>
    <p>Sem conexão no momento. Assim que a internet voltar, recarregue para continuar no Veltrix.</p>
  </main>
</body>
</html>
