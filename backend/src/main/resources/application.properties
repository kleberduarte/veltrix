# Server
server.port=8080

# Database
spring.datasource.url=jdbc:mysql://localhost:3306/veltrix?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Sao_Paulo
spring.datasource.username=root
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA — update ajusta o schema após o Flyway
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Flyway roda antes do Hibernate: corrige dados legados (ex.: role=USER) antes do DDL
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

# Adm Global (ROLE_ADM) — empresa interna "Sistema"; só cria se o e-mail ainda não existir
veltrix.global-admin.bootstrap.enabled=true
veltrix.global-admin.email=adm.global@veltrix.local
veltrix.global-admin.password=AdmGlobal2024!
veltrix.global-admin.name=Adm Global
veltrix.global-admin.company-name=Sistema

# Usuário admin da empresa (ADMIN_EMPRESA) — só cria se o e-mail ainda não existir
veltrix.admin.bootstrap.enabled=false
veltrix.admin.email=admin@veltrix.local
veltrix.admin.password=admin123
veltrix.admin.name=Administrador
veltrix.admin.company-name=Veltrix

# JWT
veltrix.jwt.secret=VeltrixSuperSecretKey2024!ChangeThisInProduction
veltrix.jwt.expiration=86400000

# CORS
spring.web.cors.allowed-origins=http://localhost:3000
