# ─── Server ───────────────────────────────────────────────────────────────────
server.port=${PORT:8080}

# ─── Database ─────────────────────────────────────────────────────────────────
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/veltrix?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Sao_Paulo}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:1234}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ─── HikariCP (connection pool) ───────────────────────────────────────────────
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=3
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000

# ─── JPA ──────────────────────────────────────────────────────────────────────
# "update" apenas para dev; produção usa "validate" via variável de ambiente
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# ─── Flyway ───────────────────────────────────────────────────────────────────
# Se editares um ficheiro em db/migration já aplicado, o checksum muda: a app falha com
# "Migration checksum mismatch". Na máquina local: mvn flyway:repair (ver pom.xml; -Dflyway.password=... se precisar).
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
# Permite aplicar V9 (Java) depois de V10+ se o histórico ficou em gap (dev ou PRD). FLYWAY_OUT_OF_ORDER=false para estrito.
spring.flyway.out-of-order=${FLYWAY_OUT_OF_ORDER:true}
# Antes de migrate: repair (remove failed no histórico, realinha checksum). Desligar: VELTRIX_FLYWAY_REPAIR_BEFORE_MIGRATE=false
veltrix.flyway.repair-before-migrate=${VELTRIX_FLYWAY_REPAIR_BEFORE_MIGRATE:true}

# ─── Bootstrap: Adm Global (ROLE_ADM) ─────────────────────────────────────────
veltrix.global-admin.bootstrap.enabled=${GLOBAL_ADMIN_BOOTSTRAP_ENABLED:true}
veltrix.global-admin.email=${GLOBAL_ADMIN_EMAIL:adm.global@veltrix.local}
veltrix.global-admin.password=${GLOBAL_ADMIN_PASSWORD:AdmGlobal2024!}
veltrix.global-admin.name=${GLOBAL_ADMIN_NAME:Adm Global}
veltrix.global-admin.company-name=${GLOBAL_ADMIN_COMPANY:Sistema}

# ─── Bootstrap: Admin Empresa (ADMIN_EMPRESA) — desabilitado por padrão ───────
veltrix.admin.bootstrap.enabled=${ADMIN_EMPRESA_BOOTSTRAP_ENABLED:false}
veltrix.admin.email=${ADMIN_EMPRESA_EMAIL:admin@veltrix.local}
veltrix.admin.password=${ADMIN_EMPRESA_PASSWORD:admin123}
veltrix.admin.name=${ADMIN_EMPRESA_NAME:Administrador}
veltrix.admin.company-name=${ADMIN_EMPRESA_COMPANY:Veltrix}

# ─── JWT ──────────────────────────────────────────────────────────────────────
# OBRIGATÓRIO em produção: defina JWT_SECRET com pelo menos 32 chars via env var
veltrix.jwt.secret=${JWT_SECRET:VeltrixDevSecretKey2024LocalOnly!DoNotUseInProd}
# Expiração em ms: 86400000 = 24h | recomendado prod: 3600000 = 1h
veltrix.jwt.expiration=${JWT_EXPIRATION:86400000}

# ─── CORS ─────────────────────────────────────────────────────────────────────
# Em produção: CORS_ALLOWED_ORIGINS=https://app.suaempresa.com.br
veltrix.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# ─── Actuator (health check para Railway) ────────────────────────────────────
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
# Probes: /actuator/health/liveness não depende do DB (evita 503 no deploy se o MySQL ainda falhar)
management.endpoint.health.probes.enabled=true
