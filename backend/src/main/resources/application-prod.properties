# ─── Produção: este arquivo sobrescreve application.properties ────────────────
# Ative com: --spring.profiles.active=prod  ou  SPRING_PROFILES_ACTIVE=prod

# Banco — DB_* ou MYSQL_ROOT_PASSWORD (Railway). Não defina DB_PASSWORD=${MYSQLPASSWORD}: quebra o placeholder.
# Alternativa: variável SPRING_DATASOURCE_PASSWORD (texto puro) sobrescreve tudo no Spring Boot.
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER:${MYSQLUSER:root}}
spring.datasource.password=${MYSQL_ROOT_PASSWORD:${DB_PASSWORD:}}

# Flyway: mesmo default que application.properties (out-of-order=true) para fechar gaps (ex.: V9 Java
# depois de V10+). Para modo estrito: FLYWAY_OUT_OF_ORDER=false nas variáveis do Railway.

# Nunca alterar o schema automaticamente em produção
spring.jpa.hibernate.ddl-auto=validate

# Nunca logar SQL em produção
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# JWT: expiração reduzida para produção (1h)
veltrix.jwt.expiration=${JWT_EXPIRATION:3600000}
