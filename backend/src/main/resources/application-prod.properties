# ─── Produção: este arquivo sobrescreve application.properties ────────────────
# Ative com: --spring.profiles.active=prod  ou  SPRING_PROFILES_ACTIVE=prod

# Banco — DB_* manual ou variáveis típicas do MySQL no Railway (MYSQL_ROOT_PASSWORD, MYSQLUSER, etc.)
# Não use DB_PASSWORD=${MYSQLPASSWORD} no painel: Spring resolve aninhado e MYSQLPASSWORD pode não existir.
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER:${MYSQLUSER:root}}
spring.datasource.password=${MYSQL_ROOT_PASSWORD:${DB_PASSWORD:${MYSQLPASSWORD:}}}

# Nunca alterar o schema automaticamente em produção
spring.jpa.hibernate.ddl-auto=validate

# Nunca logar SQL em produção
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# JWT: expiração reduzida para produção (1h)
veltrix.jwt.expiration=${JWT_EXPIRATION:3600000}
